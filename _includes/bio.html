<section class="section bio" id="chi-sono">
    <p class="section__label">L'architetto</p>
    <div class="bio__grid">
        <figure class="bio__portrait">
            <img src="{{ site.author-image | relative_url }}" alt="{{ site.author-name }}" loading="lazy" decoding="async">
        </figure>
        <div class="bio__text">
            <h2 class="section__title">{{ site.author-name }}</h2>
            <p>{{ site.author-about }}</p>
        </div>
    </div>
</section>
