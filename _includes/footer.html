<footer class="site-footer">
    <p class="site-footer__name">{{ site.author-name }}</p>
    <nav class="site-footer__links" aria-label="Contatti">
        <a href="mailto:{{ site.email }}">Email</a>
        <a href="https://www.linkedin.com/in/{{ site.linkedin_username }}" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a href="https://www.behance.net/{{ site.behance_username }}" target="_blank" rel="noopener noreferrer">Behance</a>
        <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener noreferrer">GitHub</a>
    </nav>
    <p class="site-footer__copy">&copy; {{ "now" | date: "%Y" }} {{ site.title }}</p>
</footer>
